# ── Nginx-level proxy cache for compiled Odoo asset bundles ──────────────────
# Server setup (run once):
#   sudo mkdir -p /var/cache/nginx/odoo && sudo chown www-data:www-data /var/cache/nginx/odoo
#
proxy_cache_path /var/cache/nginx/odoo
                 levels=1:2
                 keys_zone=odoo_assets:20m
                 max_size=512m
                 inactive=30d
                 use_temp_path=off;

# ── Upstream backends ────────────────────────────────────────────────────────
upstream odoo {
    server 127.0.0.1:8069;
    keepalive 32;
}

upstream odoo_chat {
    server 127.0.0.1:8072;
    keepalive 8;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name auctionchamp.live www.auctionchamp.live;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name auctionchamp.live www.auctionchamp.live;

    ssl_certificate     /etc/letsencrypt/live/auctionchamp.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auctionchamp.live/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2048M;

    # ── Timeouts ─────────────────────────────────────────────────────────────
    proxy_read_timeout    720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout    720s;

    # ── Proxy headers ────────────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect   off;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_proxied    any;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/xml image/svg+xml;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";

    # ── Longpolling → gevent worker ──────────────────────────────────────────
    location /longpolling {
        proxy_pass         http://odoo_chat;
        proxy_read_timeout 600s;
    }

    # ── Compiled asset bundles: Nginx proxy cache ─────────────────────────────
    # Root cause of Chrome/Firefox being slower than Safari:
    #   After the login POST→redirect, Chrome & Firefox send
    #   "Cache-Control: no-cache" + "Pragma: no-cache" request headers.
    #   Without the fixes below, Nginx bypasses its own proxy cache and hits
    #   Odoo workers on EVERY login in Chrome/Firefox. Safari skips these headers.
    #
    # proxy_cache_bypass 0  → ignore browser's no-cache; use Nginx cache
    # proxy_no_cache     0  → always write to Nginx cache (never skip storage)
    # proxy_ignore_headers  → ignore Odoo's response Cache-Control too
    # proxy_cache_key       → normalise key so Chrome & Safari share same entry
    location ~* ^/web/assets/ {
        proxy_cache              odoo_assets;
        proxy_cache_valid        200 30d;
        proxy_cache_lock         on;
        proxy_cache_lock_timeout 60s;
        proxy_cache_use_stale    error timeout updating;
        proxy_cache_bypass       0;
        proxy_no_cache           0;
        proxy_ignore_headers     Cache-Control Expires;
        proxy_cache_key          "$uri$is_args$args";
        proxy_pass               http://odoo;
        proxy_buffer_size        128k;
        proxy_buffers            8 256k;
        proxy_busy_buffers_size  256k;
        expires                  30d;
        add_header               Cache-Control "public, immutable";
        add_header               X-Cache-Status $upstream_cache_status;
    }

    # ── Core Odoo web static files: serve directly from disk ─────────────────
    # Same cache-bypass fix for browser no-cache after login redirect:
    # add_header Cache-Control "immutable" makes Chrome never send no-cache again
    # once it has the file cached — but for the very first request we must handle it.
    location /web/static/ {
        alias   /opt/odoo15/odoo/addons/web/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # ── Custom module static files: serve directly from disk ─────────────────
    location ~* ^/(auction_module|auction_backend_theme|auction_theme_color|muk_web_theme|auction_planner|squad_designer)/static/ {
        root    /opt/odoo15/auction_champ;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # ── All other Odoo core module static files: serve from disk ─────────────
    # Covers /mail/static/, /base_setup/static/, /web_editor/static/, etc.
    # Falls back to Odoo proxy if file is not found on disk.
    location ~* ^/[^/]+/static/ {
        root    /opt/odoo15/odoo/addons;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
        try_files $uri @odoo;
    }

    location @odoo {
        proxy_pass              http://odoo;
        proxy_buffer_size       128k;
        proxy_buffers           8 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── Main Odoo backend ────────────────────────────────────────────────────
    location / {
        proxy_pass              http://odoo;
        proxy_buffer_size       128k;
        proxy_buffers           8 256k;
        proxy_busy_buffers_size 256k;
    }
}
