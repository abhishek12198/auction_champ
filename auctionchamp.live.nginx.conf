# ── Upstream backends ────────────────────────────────────────────────────────
upstream odoo {
    server 127.0.0.1:8069;
    keepalive 32;
}

upstream odoo_chat {
    server 127.0.0.1:8072;   # gevent longpolling worker
    keepalive 8;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name auctionchamp.live www.auctionchamp.live;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    # http2 is the critical addition — without it the browser can only open
    # 6 parallel TCP connections, causing JS bundles to queue up (white screen).
    listen 443 ssl http2;
    server_name auctionchamp.live www.auctionchamp.live;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/auctionchamp.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auctionchamp.live/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Upload limit ─────────────────────────────────────────────────────────
    client_max_body_size 2048M;

    # ── Timeouts (Odoo can be slow on heavy pages) ───────────────────────────
    proxy_read_timeout    720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout    720s;

    # ── Proxy headers ────────────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect   off;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";

    # ── Longpolling → gevent worker (port 8072) ──────────────────────────────
    location /longpolling {
        proxy_pass         http://odoo_chat;
        proxy_read_timeout 600s;
    }

    # ── Static assets — aggressively cached by browser ───────────────────────
    # Odoo embeds a content-hash in every asset URL so cache-busting is automatic.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass              http://odoo;
        proxy_buffer_size       128k;
        proxy_buffers           8 256k;
        proxy_busy_buffers_size 256k;
        expires                 30d;
        add_header              Cache-Control "public, immutable";
        add_header              X-Content-Type-Options nosniff;
    }

    # ── Main Odoo backend ────────────────────────────────────────────────────
    location / {
        proxy_pass              http://odoo;
        proxy_buffer_size       128k;
        proxy_buffers           8 256k;
        proxy_busy_buffers_size 256k;
    }
}
