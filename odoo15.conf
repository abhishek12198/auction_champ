[options]
admin_passwd = {admin_password}

db_host = False
db_port = False
db_user = odoo_user
db_password = False
db_maxconn = 64

addons_path = /opt/odoo15/odoo/addons,/opt/odoo15/auction_champ

; ── Workers ──────────────────────────────────────────────────────────────────
; Rule of thumb: 2 × vCPU + 1  (adjust to your server's CPU count)
workers          = 5
max_cron_threads = 1

; ── Network ──────────────────────────────────────────────────────────────────
http_port        = 8069
longpolling_port = 8072

; Accept connections only from Nginx (localhost). Never expose 8069 to the internet.
xmlrpc_interface     = 127.0.0.1
netrpc_interface     = 127.0.0.1

; ── Proxy & security ─────────────────────────────────────────────────────────
proxy_mode = True
list_db    = False

; ── Request / time limits ────────────────────────────────────────────────────
limit_request       = 8192
limit_time_cpu      = 600
limit_time_real     = 1200
limit_time_real_cron = 300

; ── Memory limits (per worker) ───────────────────────────────────────────────
; Soft: worker recycles itself after exceeding this (2 GB)
; Hard: worker is killed immediately if it exceeds this (3 GB)
; Adjust up if your VPS has a lot of RAM (e.g. 3GB/4GB for 16GB RAM servers)
limit_memory_soft = 2147483648
limit_memory_hard = 3221225472

; ── Modules ──────────────────────────────────────────────────────────────────
server_wide_modules = base,web,bus

; ── Logging ──────────────────────────────────────────────────────────────────
log_level = info
logfile   = /var/log/odoo15.log
